<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Brasil Delas</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0a070a; --bg-1:#140f13; --bg-2:#1d151b;
    --red-vivid:#ff2d6f; --red-hot:#ff1436; --line:#2c2229;
    --text-hi:#f6eef3; --text-lo:#ad9ba8; --green:#2ecc71; --yellow:#e8b93f;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg-0);color:var(--text-hi);font-family:'Manrope',sans-serif;margin:0;min-height:100vh;}
  h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;margin:0;}
  input,textarea,select{font-family:'Manrope',sans-serif;}

  /* ---------- LOGIN ---------- */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-box{background:var(--bg-1);border:1px solid var(--line);border-radius:16px;padding:32px 26px;width:100%;max-width:340px;text-align:center;}
  .login-box h1{font-size:26px;margin-bottom:4px;}
  .login-box p{color:var(--text-lo);font-size:12.5px;margin-bottom:22px;}
  .login-box input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:13px 14px;color:var(--text-hi);font-size:14px;margin-bottom:12px;outline:none;}
  .login-box input:focus{border-color:var(--red-vivid);}
  .btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--red-vivid);color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
  .btn:disabled{opacity:.6;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-hi);}
  .login-error{color:#ff6b81;font-size:12px;margin-top:10px;display:none;}
  .login-error.show{display:block;}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh;}
  #app.show{display:block;}
  header{position:sticky;top:0;z-index:10;background:rgba(10,7,10,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
  header h1{font-size:20px;}
  header h1 span{color:var(--red-vivid);}
  .logout-btn{background:none;border:1px solid var(--line);color:var(--text-lo);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:'Manrope',sans-serif;}

  main{padding:20px;max-width:900px;margin:0 auto;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .toolbar h2{font-size:20px;}
  .add-btn{background:var(--red-vivid);color:#fff;border:none;border-radius:9px;padding:11px 16px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Manrope',sans-serif;}

  .pack-row{background:var(--bg-1);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:10px;}
  .pack-row.inactive{opacity:.5;}
  .pack-row img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg-2);}
  .pack-row-info{flex:1;min-width:0;}
  .pack-row-info h3{font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pack-row-info p{font-size:12px;color:var(--text-lo);margin-bottom:4px;}
  .pack-price{font-weight:800;color:var(--red-vivid);font-size:13px;}
  .pack-price-old{font-size:11px;color:var(--text-lo);text-decoration:line-through;margin-left:6px;}
  .pack-badge-tag{display:inline-block;background:var(--bg-2);color:var(--text-lo);font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;}
  .pack-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn-sm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2);color:var(--text-hi);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn-sm.danger{color:#ff6b81;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-lo);}

  /* ---------- MODAL DE EDIÇÃO ---------- */
  #pack-modal{position:fixed;inset:0;z-index:50;background:rgba(6,4,5,.82);display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s ease,visibility .2s ease;}
  #pack-modal.open{opacity:1;visibility:visible;}
  .modal-sheet{background:var(--bg-1);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:22px;transform:translateY(20px);transition:transform .2s ease;}
  #pack-modal.open .modal-sheet{transform:translateY(0);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-head h2{font-size:20px;}
  .modal-close{background:none;border:none;color:var(--text-lo);font-size:22px;cursor:pointer;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;color:var(--text-lo);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .field input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;color:var(--text-hi);font-size:13.5px;outline:none;}
  .field input:focus{border-color:var(--red-vivid);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:14px;}
  .toggle-row span{font-size:13px;font-weight:700;}
  .switch{position:relative;width:42px;height:24px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:20px;cursor:pointer;transition:.2s;}
  .slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--red-vivid);}
  .switch input:checked + .slider::before{transform:translateX(18px);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}
  .field-hint{font-size:11px;color:var(--text-lo);margin-top:5px;}
  .form-error{color:#ff6b81;font-size:12px;margin-top:10px;display:none;}
  .form-error.show{display:block;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#0a070a;font-weight:800;font-size:13px;padding:12px 20px;border-radius:10px;opacity:0;visibility:hidden;transition:.25s;z-index:80;white-space:nowrap;}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
  .toast.error{background:#ff4d6d;color:#fff;}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">
  <div class="login-box">
    <h1>Painel <span>Brasil Delas</span></h1>
    <p>Acesso restrito — digite a senha do painel</p>
    <input type="password" id="login-password" placeholder="Senha" autocomplete="current-password">
    <button class="btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <header>
    <h1>Painel <span>Brasil Delas</span></h1>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </header>

  <main>
    <div class="toolbar">
      <h2>Packs</h2>
      <button class="add-btn" onclick="openPackModal()">+ Adicionar pack</button>
    </div>

    <div id="packs-list"></div>
    <div class="empty-state" id="empty-state" style="display:none;">Nenhum pack cadastrado ainda.</div>
  </main>
</div>

<!-- ===================== MODAL DE PACK ===================== -->
<div id="pack-modal">
  <div class="modal-sheet">
    <div class="modal-head">
      <h2 id="modal-title">Novo pack</h2>
      <button class="modal-close" onclick="closePackModal()">&times;</button>
    </div>

    <input type="hidden" id="pack-id">

    <div class="field">
      <label>Nome</label>
      <input type="text" id="pack-name" placeholder="Ex: Caroliny Dreher" oninput="autoSlug()">
    </div>

    <div class="field">
      <label>Identificador (slug)</label>
      <input type="text" id="pack-slug" placeholder="ex-caroliny-dreher">
      <p class="field-hint">Gerado automaticamente pelo nome. Não use espaços ou acentos.</p>
    </div>

    <div class="field">
      <label>Descrição</label>
      <input type="text" id="pack-description" placeholder="Ex: 30 vídeos">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Preço (R$)</label>
        <input type="number" step="0.01" id="pack-price" placeholder="49.90">
      </div>
      <div class="field">
        <label>Preço riscado (opcional)</label>
        <input type="number" step="0.01" id="pack-original-price" placeholder="Deixe vazio se não tiver">
      </div>
    </div>

    <div class="field">
      <label>Imagem (caminho do arquivo)</label>
      <input type="text" id="pack-image" placeholder="images/caroliny.jpg">
    </div>

    <div class="field">
      <label>Selo (opcional)</label>
      <input type="text" id="pack-badge" placeholder="Ex: Mais vendido, Combo x3, VIP">
    </div>

    <div class="field">
      <label>Posição na loja</label>
      <input type="number" id="pack-position" placeholder="1">
    </div>

    <div class="toggle-row">
      <span>Visível na loja</span>
      <label class="switch">
        <input type="checkbox" id="pack-active" checked>
        <span class="slider"></span>
      </label>
    </div>

    <p class="form-error" id="form-error"></p>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closePackModal()">Cancelar</button>
      <button class="btn" id="save-btn" onclick="savePack()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://brasildelas-api.brasildelasltda.workers.dev';

  let adminPassword = sessionStorage.getItem('bd_admin_pass') || '';
  let allPacks = [];

  if (adminPassword) {
    verifyAndEnter();
  }

  async function doLogin() {
    const pass = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    errEl.classList.remove('show');

    if (!pass) return;
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      const res = await fetch(API_URL + '/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass }),
      });
      const data = await res.json();

      if (data.ok) {
        adminPassword = pass;
        sessionStorage.setItem('bd_admin_pass', pass);
        enterApp();
      } else {
        errEl.textContent = 'Senha incorreta.';
        errEl.classList.add('show');
      }
    } catch (err) {
      errEl.textContent = 'Erro de conexão. Tente novamente.';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  async function verifyAndEnter() {
    try {
      const res = await fetch(API_URL + '/admin/packs', {
        headers: { 'x-admin-password': adminPassword },
      });
      if (res.ok) {
        enterApp();
      } else {
        sessionStorage.removeItem('bd_admin_pass');
        adminPassword = '';
      }
    } catch (err) { /* fica na tela de login */ }
  }

  function doLogout() {
    sessionStorage.removeItem('bd_admin_pass');
    adminPassword = '';
    document.getElementById('app').classList.remove('show');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-password').value = '';
  }

  function enterApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    loadPacks();
  }

  async function loadPacks() {
    try {
      const res = await fetch(API_URL + '/admin/packs', {
        headers: { 'x-admin-password': adminPassword },
      });
      allPacks = await res.json();
      renderPacks();
    } catch (err) {
      showToast('Erro ao carregar packs.', true);
    }
  }

  function renderPacks() {
    const list = document.getElementById('packs-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (!allPacks.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    allPacks.sort((a, b) => a.position - b.position).forEach(p => {
      const row = document.createElement('div');
      row.className = 'pack-row' + (p.active ? '' : ' inactive');
      row.innerHTML = `
        <img src="${escapeHtml(p.image_url || '')}" alt="">
        <div class="pack-row-info">
          <h3>${escapeHtml(p.name)}${p.badge ? `<span class="pack-badge-tag">${escapeHtml(p.badge)}</span>` : ''}</h3>
          <p>${escapeHtml(p.description || '')}</p>
          <span class="pack-price">R$ ${Number(p.price).toFixed(2).replace('.', ',')}</span>
          ${p.original_price ? `<span class="pack-price-old">R$ ${Number(p.original_price).toFixed(2).replace('.', ',')}</span>` : ''}
        </div>
        <div class="pack-actions">
          <button class="icon-btn-sm" onclick="openPackModal(${p.id})" title="Editar">✎</button>
          <button class="icon-btn-sm danger" onclick="confirmDelete(${p.id})" title="Excluir">🗑</button>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  }

  function openPackModal(id) {
    document.getElementById('form-error').classList.remove('show');
    const pack = id ? allPacks.find(p => p.id === id) : null;

    document.getElementById('modal-title').textContent = pack ? 'Editar pack' : 'Novo pack';
    document.getElementById('pack-id').value = pack ? pack.id : '';
    document.getElementById('pack-name').value = pack ? pack.name : '';
    document.getElementById('pack-slug').value = pack ? pack.slug : '';
    document.getElementById('pack-description').value = pack ? (pack.description || '') : '';
    document.getElementById('pack-price').value = pack ? pack.price : '';
    document.getElementById('pack-original-price').value = pack && pack.original_price ? pack.original_price : '';
    document.getElementById('pack-image').value = pack ? (pack.image_url || '') : '';
    document.getElementById('pack-badge').value = pack ? (pack.badge || '') : '';
    document.getElementById('pack-position').value = pack ? pack.position : (allPacks.length + 1);
    document.getElementById('pack-active').checked = pack ? !!pack.active : true;

    document.getElementById('pack-modal').classList.add('open');
  }

  function closePackModal() {
    document.getElementById('pack-modal').classList.remove('open');
  }

  function autoSlug() {
    if (document.getElementById('pack-id').value) return;
    const name = document.getElementById('pack-name').value;
    const slug = name
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
    document.getElementById('pack-slug').value = slug;
  }

  async function savePack() {
    const errEl = document.getElementById('form-error');
    errEl.classList.remove('show');

    const id = document.getElementById('pack-id').value;
    const name = document.getElementById('pack-name').value.trim();
    const slug = document.getElementById('pack-slug').value.trim();
    const price = parseFloat(document.getElementById('pack-price').value);

    if (!name || !slug || isNaN(price)) {
      errEl.textContent = 'Preencha ao menos nome, identificador e preço.';
      errEl.classList.add('show');
      return;
    }

    const payload = {
      slug,
      name,
      description: document.getElementById('pack-description').value.trim() || null,
      price,
      original_price: document.getElementById('pack-original-price').value
        ? parseFloat(document.getElementById('pack-original-price').value) : null,
      image_url: document.getElementById('pack-image').value.trim() || null,
      badge: document.getElementById('pack-badge').value.trim() || null,
      position: parseInt(document.getElementById('pack-position').value) || 0,
      active: document.getElementById('pack-active').checked ? 1 : 0,
    };

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const url = id ? `${API_URL}/admin/packs/${id}` : `${API_URL}/admin/packs`;
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Erro ao salvar.');

      closePackModal();
      showToast(id ? 'Pack atualizado!' : 'Pack criado!');
      loadPacks();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  }

  async function confirmDelete(id) {
    const pack = allPacks.find(p => p.id === id);
    if (!confirm(`Excluir "${pack ? pack.name : 'este pack'}"? Essa ação não pode ser desfeita.`)) return;

    try {
      const res = await fetch(`${API_URL}/admin/packs/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-password': adminPassword },
      });
      if (!res.ok) throw new Error();
      showToast('Pack excluído.');
      loadPacks();
    } catch (err) {
      showToast('Erro ao excluir.', true);
    }
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.classList.remove('show'); }, 2600);
  }

  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
